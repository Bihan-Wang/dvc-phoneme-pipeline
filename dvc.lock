    - path: src/build_clean_manifest.py
      hash: md5
      md5: ff64eed2157a31770985df091696c065
      size: 5062
    params:
      params.yaml:
        dataset.en:
          root_dir: LibriSpeech/dev-clean
          transcript_glob: '*.trans.txt'
          audio_ext: .wav
        manifests.en_clean: manifests/en/clean.jsonl
        phoneme_voices.en: en-us
    outs:
    - path: manifests/en/clean.jsonl
      hash: md5
      md5: b2b21b0062c3af5e9a7b96cd2ded9bb0
      size: 1461514
  make_noisy_manifests_en:
