        manifests.en_clean: manifests/en/clean.jsonl
        manifests.en_noisy_dir: manifests/en/noisy
        noise.en.audio_root: data/interim/noisy/en
        seed: 42
        snr_levels_csv: 40,30,20,10,0
    outs:
    - path: data/interim/noisy/en
      hash: md5
      md5: 29e7871d9811313cb4b9b8d6cd0e291c.dir
      size: 3103973980
