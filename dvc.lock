      size: 6341
    params:
      params.yaml:
        inference.batch_size: 4
        inference.device: cpu
        inference.en_output_dir: manifests/en/predictions
        inference.max_utts_per_manifest: 100
        inference.model_id: facebook/wav2vec2-lv-60-espeak-cv-ft
        manifests.en_noisy_dir: manifests/en/noisy
    outs:
    - path: manifests/en/predictions
